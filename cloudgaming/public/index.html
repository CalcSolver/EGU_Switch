<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGU Windows Controller</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
        #canvas-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="stream-canvas"></canvas>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('stream-canvas');

        // Track screen touches and convert to absolute scale metrics
        window.addEventListener('touchstart', (e) => {
            if(e.touches.length === 1) {
                const rect = canvas.getBoundingClientRect();
                const xRatio = (e.touches[0].clientX - rect.left) / rect.width;
                const yRatio = (e.touches[0].clientY - rect.top) / rect.height;
                
                if (xRatio >= 0 && xRatio <= 1 && yRatio >= 0 && yRatio <= 1) {
                    socket.emit('mouse-move', { x: xRatio, y: yRatio });
                    socket.emit('mouse-click');
                }
            }
        });
    </script>
</body>
</html>
