<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EGU Host Central Console</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        h1 { font-size: 20px; margin: 0 0 5px 0; color: #3b82f6; }
        .status-container { margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
        
        /* Dashboard Layout */
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 15px;
            text-align: center;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            font-size: 13px;
        }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #475569; cursor: not-allowed; }

        /* Switch */
        .switch-wrapper { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(30px); }

        #link-display {
            font-size: 12px;
            color: #10b981;
            display: none;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px;
            border-radius: 6px;
            border: 1px dashed #10b981;
            margin-top: 10px;
        }
        #log-window {
            width: 100%;
            max-width: 340px;
            height: 60px;
            background: #020617;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            padding: 8px;
            box-sizing: border-box;
            overflow-y: auto;
            color: #38bdf8;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>EGU Engine Console</h1>
    <div class="status-container">System Status: <span id="status-text" style="color:#e2e8f0;">Awaiting Setup</span></div>

    <div class="card">
        <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">Hardware Environment Setup</div>
        <button id="setup-btn" class="btn">Click to Auto-Build Modules</button>
    </div>

    <div class="card">
        <div style="font-size: 13px; font-weight: 600;">Cloud Server Pipeline</div>
        <div class="switch-wrapper">
            <span>OFF</span>
            <label class="switch">
                <input type="checkbox" id="power-toggle" disabled>
                <span class="slider"></span>
            </label>
            <span>ON</span>
        </div>
        <div id="link-display">Streaming Link: <span>http://localhost:3000</span></div>
    </div>

    <div id="log-window">System ready. Click setup to verify compilation layers...</div>

    <script>
        const { ipcRenderer } = require('electron');
        const setupBtn = document.getElementById('setup-btn');
        const toggle = document.getElementById('power-toggle');
        const statusText = document.getElementById('status-text');
        const linkDisplay = document.getElementById('link-display');
        const logWindow = document.getElementById('log-window');

        function addLog(text) {
            logWindow.innerText = text;
        }

        setupBtn.addEventListener('click', () => {
            setupBtn.disabled = true;
            setupBtn.innerText = "Compiling... Please Wait";
            addLog("Triggering compilation scripts in background...");
            ipcRenderer.send('run-setup');
        });

        ipcRenderer.on('setup-finished', (event, result) => {
            setupBtn.innerText = "Setup Verified ✓";
            if (result.success) {
                statusText.innerText = "Ready to Host";
                statusText.style.color = "#3b82f6";
                toggle.disabled = false;
                addLog("Native binaries verified successfully.");
            } else {
                setupBtn.disabled = false;
                setupBtn.innerText = "Setup Failed. Retry?";
                addLog("Error: " + result.error);
            }
        });

        toggle.addEventListener('change', () => {
            const targetState = toggle.checked ? 'on' : 'off';
            ipcRenderer.send('toggle-server', targetState);
        });

        ipcRenderer.on('server-status', (event, status) => {
            if (status.running) {
                statusText.innerText = "HOST ACTIVE";
                statusText.style.color = "#10b981";
                linkDisplay.style.display = "block";
                addLog("Express + Socket.io running on port 3000.");
            } else {
                statusText.innerText = "Ready to Host";
                statusText.style.color = "#3b82f6";
                linkDisplay.style.display = "none";
                toggle.checked = false;
                if (status.error) {
                    addLog("Startup Error: " + status.error);
                } else {
                    addLog("Server stopped smoothly.");
                }
            }
        });
    </script>
</body>
</html>
